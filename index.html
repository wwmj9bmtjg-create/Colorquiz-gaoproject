<!DOCTYPE html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>がおがおの いろクイズ</title><style>body{margin:0;font-family:sans-serif;background:#bfefff;display:flex;justify-content:center;align-items:center;height:100vh}.card{background:#fff;border-radius:24px;padding:24px;width:340px;text-align:center}.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.btn{height:90px;border:none;border-radius:20px}.r{background:#ff5a5a}.b{background:#4f8cff}.y{background:#ffd84d}.g{background:#59c96a}</style></head><body><div class="card"><div id=dino style="font-size:64px">🦕</div><h2>がおがおの いろクイズ</h2><div id=q></div><div class=grid><button class="btn r" onclick="pick('あか')"></button><button class="btn b" onclick="pick('あお')"></button><button class="btn y" onclick="pick('きいろ')"></button><button class="btn g" onclick="pick('みどり')"></button></div><p id=msg>タップしてね！</p><p id=score>せいかい 0</p><button onclick="resetGame()">もういちど</button></div><script>const colors=['あか','あお','きいろ','みどり'];let ans='',score=0,q=document.getElementById('q'),msg=document.getElementById('msg'),dino=document.getElementById('dino'),scoreEl=document.getElementById('score');function next(){ans=colors[Math.floor(Math.random()*4)];q.textContent=ans+' は どれ？';}function pick(c){if(c===ans){score++;msg.textContent='🎉 せいかい！';dino.textContent='🥳';}else{msg.textContent='😊 もういっかい！';dino.textContent='😅';}scoreEl.textContent='せいかい '+score;setTimeout(()=>{dino.textContent='🦕';next();},700);}function resetGame(){score=0;scoreEl.textContent='せいかい 0';msg.textContent='タップしてね！';dino.textContent='🦕';next();}next();</script></body></html>
