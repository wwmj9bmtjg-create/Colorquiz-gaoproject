<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>いろあてクイズ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-top:#EAF6FF;
    --bg-bottom:#FFF6E5;
    --ink:#2B2D42;
    --star:#FFC947;
    --cloud:#FFFFFF;
    --cloud-line:#4A4A4A;
    --red:#FF4B4B;
    --blue:#2F8CFF;
    --yellow:#FFD23F;
    --green:#3FCE73;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none;}
  html,body{
    margin:0; padding:0; height:100%; overflow:hidden;
    touch-action:manipulation;
    background:linear-gradient(180deg,var(--bg-top) 0%, var(--bg-bottom) 100%);
    font-family:'Zen Maru Gothic', sans-serif;
    color:var(--ink);
  }
  #app{
    position:relative;
    width:100%; height:100dvh;
    display:flex; flex-direction:column; align-items:center;
    padding:env(safe-area-inset-top) 16px env(safe-area-inset-bottom) 16px;
    overflow:hidden;
  }

  /* ---------- スコア ---------- */
  #score{
    position:absolute; top:16px; right:16px;
    font-family:'Mochiy Pop One', sans-serif;
    font-size:clamp(18px,4vw,26px);
    background:#fff; border-radius:999px;
    padding:8px 18px;
    box-shadow:0 4px 0 #e3ddc8;
    display:flex; align-items:center; gap:6px;
    z-index:5;
  }
  #score span{color:var(--star);}

  /* ---------- スタート画面 ---------- */
  #startScreen{
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:28px; z-index:20;
    background:linear-gradient(180deg,var(--bg-top) 0%, var(--bg-bottom) 100%);
  }
  #startScreen h1{
    font-family:'Mochiy Pop One', sans-serif;
    font-size:clamp(34px,9vw,58px);
    margin:0; text-align:center;
    color:var(--ink);
    text-shadow:3px 3px 0 #fff;
  }
  #startBtn{
    font-family:'Mochiy Pop One', sans-serif;
    font-size:clamp(24px,6vw,34px);
    color:#fff;
    background:linear-gradient(180deg,#FF8A65,#FF6F3C);
    border:none; border-radius:999px;
    padding:22px 60px;
    box-shadow:0 8px 0 #D9531D;
    cursor:pointer;
    animation:pulse 1.6s ease-in-out infinite;
  }
  #startBtn:active{ transform:translateY(6px); box-shadow:0 2px 0 #D9531D; }
  @keyframes pulse{ 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }

  /* ---------- マスコット ---------- */
  #mascotWrap{ margin-top:6px; }
  #mascot{ width:clamp(120px,28vw,190px); height:auto; display:block; }

  /* ---------- 質問 ---------- */
  #question{
    font-family:'Mochiy Pop One', sans-serif;
    font-size:clamp(26px,7vw,44px);
    text-align:center;
    margin:6px 0 18px 0;
    line-height:1.3;
  }
  #question .target{
    display:inline-block;
    padding:0 .15em;
  }

  /* ---------- 選択肢グリッド ---------- */
  #grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:22px;
    width:min(92vw,520px);
    flex:1;
    align-content:center;
    padding-bottom:10px;
  }
  .colorBtn{
    position:relative;
    aspect-ratio:1/1;
    border-radius:38%;
    border:none;
    box-shadow:0 8px 0 rgba(0,0,0,0.15), inset 0 -8px 14px rgba(0,0,0,0.12), inset 0 8px 14px rgba(255,255,255,0.35);
    cursor:pointer;
    transition:transform .08s ease;
  }
  .colorBtn:active{ transform:translateY(6px); }
  .colorBtn::after{
    content:"";
    position:absolute; inset:14%;
    border-radius:50%;
    background:radial-gradient(circle at 35% 30%, rgba(255,255,255,0.55), rgba(255,255,255,0) 60%);
  }
  .colorBtn.correct-flash{ animation:pop .55s ease; }
  .colorBtn.wrong-flash{ animation:shake .45s ease; }
  @keyframes pop{ 0%{transform:scale(1);} 40%{transform:scale(1.18);} 100%{transform:scale(1);} }
  @keyframes shake{
    0%,100%{transform:translateX(0);}
    20%{transform:translateX(-10px);}
    40%{transform:translateX(10px);}
    60%{transform:translateX(-8px);}
    80%{transform:translateX(8px);}
  }

  /* ---------- 紙吹雪/きらきら ---------- */
  .sparkle{
    position:absolute;
    font-size:28px;
    pointer-events:none;
    z-index:30;
    animation:floatUp 1.1s ease-out forwards;
  }
  @keyframes floatUp{
    0%{ transform:translateY(0) scale(0.6) rotate(0deg); opacity:1; }
    100%{ transform:translateY(-140px) scale(1.15) rotate(40deg); opacity:0; }
  }

  #muteBtn{
    position:absolute; top:16px; left:16px;
    width:48px; height:48px; border-radius:50%;
    border:none; background:#fff; font-size:22px;
    box-shadow:0 4px 0 #e3ddc8; z-index:5; cursor:pointer;
  }

  @media (prefers-reduced-motion: reduce){
    #startBtn{ animation:none; }
    .sparkle{ animation:none; opacity:0; }
  }
</style>
</head>
<body>
<div id="app">

  <button id="muteBtn" aria-label="おとを けす">🔊</button>
  <div id="score">⭐<span id="scoreNum">0</span></div>

  <div id="mascotWrap">
    <svg id="mascot" viewBox="0 0 200 140" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="100" cy="90" rx="90" ry="45" fill="#FFFFFF" stroke="#4A4A4A" stroke-width="4"/>
      <circle cx="55" cy="60" r="42" fill="#FFFFFF" stroke="#4A4A4A" stroke-width="4"/>
      <circle cx="145" cy="60" r="42" fill="#FFFFFF" stroke="#4A4A4A" stroke-width="4"/>
      <circle cx="100" cy="45" r="50" fill="#FFFFFF" stroke="#4A4A4A" stroke-width="4"/>
      <g id="faceHappy">
        <circle cx="80" cy="55" r="7" fill="#4A4A4A"/>
        <circle cx="120" cy="55" r="7" fill="#4A4A4A"/>
        <path d="M78 78 Q100 100 122 78" stroke="#4A4A4A" stroke-width="5" fill="none" stroke-linecap="round"/>
        <circle cx="65" cy="70" r="9" fill="#FFB6B6" opacity="0.7"/>
        <circle cx="135" cy="70" r="9" fill="#FFB6B6" opacity="0.7"/>
      </g>
      <g id="faceThink" style="display:none">
        <ellipse cx="80" cy="55" rx="7" ry="9" fill="#4A4A4A"/>
        <ellipse cx="120" cy="55" rx="7" ry="9" fill="#4A4A4A"/>
        <path d="M82 85 Q100 78 118 85" stroke="#4A4A4A" stroke-width="5" fill="none" stroke-linecap="round"/>
      </g>
    </svg>
  </div>

  <div id="question">いろを タップしてね</div>

  <div id="grid">
    <button class="colorBtn" data-color="red"></button>
    <button class="colorBtn" data-color="blue"></button>
    <button class="colorBtn" data-color="yellow"></button>
    <button class="colorBtn" data-color="green"></button>
  </div>

  <div id="startScreen">
    <h1>いろあて<br>クイズ</h1>
    <button id="startBtn">▶ スタート</button>
  </div>
</div>

<script>
(function(){
  const COLORS = {
    red:    { name:"あか",   hex:"#FF4B4B" },
    blue:   { name:"あお",   hex:"#2F8CFF" },
    yellow: { name:"きいろ", hex:"#FFD23F" },
    green:  { name:"みどり", hex:"#3FCE73" }
  };
  const KEYS = Object.keys(COLORS);

  const grid = document.getElementById('grid');
  const buttons = Array.from(grid.querySelectorAll('.colorBtn'));
  const questionEl = document.getElementById('question');
  const scoreEl = document.getElementById('scoreNum');
  const startScreen = document.getElementById('startScreen');
  const startBtn = document.getElementById('startBtn');
  const muteBtn = document.getElementById('muteBtn');
  const faceHappy = document.getElementById('faceHappy');
  const faceThink = document.getElementById('faceThink');
  const mascot = document.getElementById('mascot');

  let score = 0;
  let target = null;
  let muted = false;
  let audioCtx = null;
  let busy = false; // 演出中はタップ無効

  function ensureAudioCtx(){
    if(!audioCtx){
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    return audioCtx.resume();
  }

  function unlockAudio(){
    ensureAudioCtx().then(()=>{
      // 無音バッファを一度再生してiOS等のロックを解除する
      const buffer = audioCtx.createBuffer(1, 1, 22050);
      const src = audioCtx.createBufferSource();
      src.buffer = buffer;
      src.connect(audioCtx.destination);
      src.start(0);
    });
  }

  function playTone(freq, delay, duration, type, peakVol){
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    const t = audioCtx.currentTime + delay;
    gain.gain.setValueAtTime(0.0001, t);
    gain.gain.linearRampToValueAtTime(peakVol, t + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + duration);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + duration + 0.03);
  }

  function chime(correct){
    if(muted) return;
    ensureAudioCtx().then(()=>{
      const notes = correct ? [523.25, 659.25, 784.0] : [330, 262];
      notes.forEach((freq, i)=>{
        playTone(freq, i*0.12, 0.3, 'sine', 0.28);
      });
    });
  }

  function sparkleSound(){
    if(muted) return;
    ensureAudioCtx().then(()=>{
      const notes = [1046.5, 1318.5, 1568.0, 2093.0];
      notes.forEach((freq, i)=>{
        playTone(freq, i*0.07, 0.22, 'triangle', 0.16);
      });
    });
  }

  function popSound(){
    if(muted) return;
    ensureAudioCtx().then(()=>{
      playTone(660, 0, 0.22, 'sine', 0.2);
    });
  }

  function setMascot(happy){
    faceHappy.style.display = happy ? 'block' : 'none';
    faceThink.style.display = happy ? 'none' : 'block';
  }

  function shuffle(arr){
    const a = arr.slice();
    for(let i=a.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [a[i],a[j]]=[a[j],a[i]];
    }
    return a;
  }

  function layoutRound(){
    const order = shuffle(KEYS);
    buttons.forEach((btn, i)=>{
      const key = order[i];
      btn.dataset.color = key;
      btn.style.background = COLORS[key].hex;
    });
    target = order[Math.floor(Math.random()*order.length)];
    questionEl.innerHTML = `<span class="target" style="color:${COLORS[target].hex}">${COLORS[target].name}</span> は どれかな？`;
    setMascot(true);
    setTimeout(()=>{ popSound(); }, 300);
  }

  function burstSparkles(btn){
    const rect = btn.getBoundingClientRect();
    const emojis = ['⭐','✨','🌟'];
    for(let i=0;i<6;i++){
      const s = document.createElement('div');
      s.className = 'sparkle';
      s.textContent = emojis[Math.floor(Math.random()*emojis.length)];
      s.style.left = (rect.left + rect.width/2 + (Math.random()*80-40)) + 'px';
      s.style.top = (rect.top + rect.height/2) + 'px';
      document.body.appendChild(s);
      setTimeout(()=> s.remove(), 1200);
    }
  }

  function handleAnswer(btn){
    if(busy) return;
    const chosen = btn.dataset.color;
    if(chosen === target){
      busy = true;
      btn.classList.add('correct-flash');
      burstSparkles(btn);
      chime(true);
      sparkleSound();
      setMascot(true);
      score += 1;
      scoreEl.textContent = score;
      setTimeout(()=>{
        btn.classList.remove('correct-flash');
        busy = false;
        layoutRound();
      }, 1400);
    } else {
      btn.classList.add('wrong-flash');
      chime(false);
      setMascot(false);
      setTimeout(()=>{
        btn.classList.remove('wrong-flash');
        setMascot(true);
      }, 700);
    }
  }

  buttons.forEach(btn=>{
    btn.addEventListener('click', ()=> handleAnswer(btn));
  });

  muteBtn.addEventListener('click', ()=>{
    muted = !muted;
    muteBtn.textContent = muted ? '🔇' : '🔊';
  });

  startBtn.addEventListener('click', ()=>{
    unlockAudio();
    startScreen.style.display = 'none';
    layoutRound();
  });
})();
</script>
</body>
</html>
